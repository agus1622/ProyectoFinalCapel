<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>FINCAP - Homebanking</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <h1>FINCAP</h1>
        <button id="btnLogout" class="logout-btn hidden">Cerrar sesión</button>
    </header>
    <main>
        <section id="login-section">
            <h2>Iniciar Sesión</h2>

            <input type="text" id="inputUsuario" placeholder="Usuario">
            <input type="password" id="inputPin" placeholder="PIN">
            <button id="btnLogin">Ingresar</button>

            <p id="mensajeLogin"></p>
        </section>

        <section id="appSection" class="hidden">

            <h2>Hola, <span id="nombreUsuario"></span></h2>

            <h3>Cuentas</h3>

            <div id="info" class="tarjeta"></div>

            <div class="acciones">
                <button id="btnSaldoArs">Consultar saldo en pesos</button>
                <button id="btnSaldoDol">Consultar saldo en dólares</button>
                <button id="btnMovimientos">Ver movimientos</button>
                <input type="number" id="inputPlazoFijo" placeholder="Monto a invertir">
                <button id="btnPlazoFijo">Constituir plazo fijo a 30 días</button>
            </div>

            <div id="resultado"></div>
            <ul id="listaMovimientos"></ul>

        </section>
        
        <script src="js/cuentas.js"></script>
        <script src="js/main.js"></script>
    </main>
</body>

</html>
